<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personality Quiz</title>
    <link rel="icon" type="image/x-icon" href="/img/ideas.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href ="./css/style.css">
</head>
<body>
    <h1 class="text-center mt-4">YOUR QUIZ TITLE HERE</h1>
    
    <!-- Start quiz element -->
    <!-- QUESTION 1 -->
<div class="question-block mb-4">
    <h3>Which universe do you prefer?</h3>
    <div class="row g-2 mt-2">
        <div class="col-6">
            <button class="answer-btn w-100" data-answer="marvel">Marvel</button>
        </div>
        <div class="col-6">
            <button class="answer-btn w-100" data-answer="dc">DC</button>
        </div>
    </div>
</div>

<!-- QUESTION 2 -->
<div class="question-block mb-4">
    <h3>What weapon do you prefer?</h3>
    <div class="row g-2 mt-2">
        <div class="col-6">
            <button class="answer-btn w-100" data-answer="money-tech">Money / Tech</button>
        </div>
        <div class="col-6">
            <button class="answer-btn w-100" data-answer="strength-speed">Strength / Speed</button>
        </div>
        <div class="col-6">
            <button class="answer-btn w-100" data-answer="projectiles">Projectiles</button>
        </div>
        <div class="col-6">
            <button class="answer-btn w-100" data-answer="close-combat">Close‑quarters Combat</button>
        </div>
    </div>
</div>

<!-- QUESTION 3 -->
<div class="question-block mb-4">
    <h3>What kind of hero are you?</h3>
    <div class="row g-2 mt-2">
        <div class="col-6">
            <button class="answer-btn w-100" data-answer="good-heart">Good‑hearted hero</button>
        </div>
        <div class="col-6">
            <button class="answer-btn w-100" data-answer="anti-hero">Anti‑hero</button>
        </div>
        <div class="col-6">
            <button class="answer-btn w-100" data-answer="leader">Leader</button>
        </div>
        <div class="col-6">
            <button class="answer-btn w-100" data-answer="team-player">Team player</button>
        </div>
    </div>
</div>

    
    
    <!-- End quiz element -->

    <!-- Add more quiz elements here -->



    <div class="container d-flex justify-content-center">
      <button id="show-result" class="btn btn-success my-4">Show Results</button>
    </div>    
    <!-- Output the result here -->
    <div class="container d-flex justify-content-center">
      <div id="result-container" class="card p-4 mb-4" style="width: 75%; display: none;">
        <h3>Your Result:</h3>
        <p id="result-text"></p>
      </div>
    </div>
    
    <!-- Connect to your script file here -->
     <script src = "./js/script.js"></script>
</body>
</html>
